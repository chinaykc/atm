name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version, for example v0.1.0"
        required: true
        type: string

permissions:
  contents: read

jobs:
  build:
    if: github.actor == 'chinaykc'
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux/amd64
            artifact: linux-amd64
          - os: ubuntu-latest
            target: linux/arm64
            artifact: linux-arm64
          - os: macos-latest
            target: darwin/amd64
            artifact: darwin-amd64
          - os: macos-latest
            target: darwin/arm64
            artifact: darwin-arm64
          - os: windows-latest
            target: windows/amd64
            artifact: windows-amd64
          - os: windows-latest
            target: windows/arm64
            artifact: windows-arm64
    env:
      VERSION: ${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}
      ATM_RELEASE_TARGETS: ${{ matrix.target }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"

      - name: Build release binary
        shell: bash
        run: ./release.sh "$VERSION"

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: atm-${{ matrix.artifact }}
          path: |
            dist/${{ env.VERSION }}/atm-*
            dist/${{ env.VERSION }}/*.sha256
          if-no-files-found: error

  release:
    if: github.actor == 'chinaykc'
    needs: build
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}
    permissions:
      contents: write

    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/${{ env.VERSION }}
          merge-multiple: true

      - name: Verify checksums
        shell: bash
        run: |
          cd "dist/$VERSION"
          cat ./*.sha256 | sort -k2 > checksums.txt
          sha256sum -c checksums.txt
          rm ./*.sha256

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.VERSION }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          files: |
            dist/${{ env.VERSION }}/atm-*
            dist/${{ env.VERSION }}/checksums.txt
