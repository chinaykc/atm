<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360" role="img" aria-labelledby="title desc">
  <title id="title">ATM pixel mascot logo, green bill version</title>
  <desc id="desc">A pixel-art cartoon ATM inside a Markdown panel, smiling and spitting green bills.</desc>
  <defs>
    <clipPath id="screen-clip-usd">
      <rect x="260" y="132" width="120" height="48"/>
    </clipPath>
  </defs>
  <style>
    .px { shape-rendering: crispEdges; }
    .bill-a { animation: billA 3s linear infinite; opacity: 0; }
    .bill-b { animation: billB 3s linear infinite .05s; opacity: 0; }
    .bill-c { animation: billC 3s linear infinite .1s; opacity: 0; }
    .bill-d { animation: billD 3s linear infinite .15s; opacity: 0; }
    .bill-e { animation: billE 3s linear infinite .2s; opacity: 0; }
    .bill-f { animation: billF 3s linear infinite .25s; opacity: 0; }
    .bill-left-a { animation: billLeftA 3s linear infinite .08s; opacity: 0; }
    .bill-left-b { animation: billLeftB 3s linear infinite .16s; opacity: 0; }
    .bill-left-c { animation: billLeftC 3s linear infinite .24s; opacity: 0; }
    .md-feed-a { animation: docFeed 9s linear infinite; opacity: 0; }
    .md-feed-b { animation: docFeed 9s linear infinite 3s; opacity: 0; }
    .md-feed-c { animation: docFeed 9s linear infinite 6s; opacity: 0; }
    .eyes { animation: blink 3.8s steps(1, end) infinite; transform-origin: 320px 151px; }
    .arm-left { animation: waveLeft 1.2s steps(2, end) infinite; transform-origin: 221px 202px; }
    .arm-right { animation: waveRight 1.2s steps(2, end) infinite; transform-origin: 419px 202px; }
    .screen-shine { animation: scan 2.1s linear infinite; }
    .slot { animation: slotPulse 1.45s steps(2, end) infinite; }

    @keyframes billA {
      0%, 48% { transform: translate(0, 0) rotate(0deg); opacity: 0; }
      52% { transform: translate(42px, -26px) rotate(-4deg); opacity: 1; }
      68% { transform: translate(126px, -62px) rotate(8deg); opacity: 1; }
      84%, 100% { transform: translate(190px, -48px) rotate(18deg); opacity: 0; }
    }
    @keyframes billB {
      0%, 48% { transform: translate(0, 0) rotate(0deg); opacity: 0; }
      52% { transform: translate(56px, -8px) rotate(6deg); opacity: 1; }
      68% { transform: translate(138px, 22px) rotate(-6deg); opacity: 1; }
      84%, 100% { transform: translate(182px, 54px) rotate(-16deg); opacity: 0; }
    }
    @keyframes billC {
      0%, 48% { transform: translate(0, 0) rotate(0deg); opacity: 0; }
      52% { transform: translate(42px, 18px) rotate(8deg); opacity: 1; }
      68% { transform: translate(116px, 62px) rotate(16deg); opacity: 1; }
      84%, 100% { transform: translate(160px, 98px) rotate(24deg); opacity: 0; }
    }
    @keyframes billD {
      0%, 48% { transform: translate(0, 0) rotate(0deg); opacity: 0; }
      52% { transform: translate(64px, -12px) rotate(8deg); opacity: 1; }
      68% { transform: translate(150px, 0) rotate(18deg); opacity: 1; }
      84%, 100% { transform: translate(198px, 20px) rotate(28deg); opacity: 0; }
    }
    @keyframes billE {
      0%, 48% { transform: translate(0, 0) rotate(0deg); opacity: 0; }
      52% { transform: translate(38px, -38px) rotate(-8deg); opacity: 1; }
      68% { transform: translate(112px, -86px) rotate(-14deg); opacity: 1; }
      84%, 100% { transform: translate(168px, -88px) rotate(-24deg); opacity: 0; }
    }
    @keyframes billF {
      0%, 48% { transform: translate(0, 0) rotate(0deg); opacity: 0; }
      52% { transform: translate(34px, 30px) rotate(4deg); opacity: 1; }
      68% { transform: translate(108px, 94px) rotate(12deg); opacity: 1; }
      84%, 100% { transform: translate(154px, 130px) rotate(20deg); opacity: 0; }
    }
    @keyframes billLeftA {
      0%, 48% { transform: translate(0, 0) rotate(0deg); opacity: 0; }
      52% { transform: translate(-44px, -22px) rotate(4deg); opacity: 1; }
      68% { transform: translate(-124px, -52px) rotate(-8deg); opacity: 1; }
      84%, 100% { transform: translate(-184px, -34px) rotate(-18deg); opacity: 0; }
    }
    @keyframes billLeftB {
      0%, 48% { transform: translate(0, 0) rotate(0deg); opacity: 0; }
      52% { transform: translate(-52px, 8px) rotate(-5deg); opacity: 1; }
      68% { transform: translate(-126px, 42px) rotate(8deg); opacity: 1; }
      84%, 100% { transform: translate(-170px, 68px) rotate(18deg); opacity: 0; }
    }
    @keyframes billLeftC {
      0%, 48% { transform: translate(0, 0) rotate(0deg); opacity: 0; }
      52% { transform: translate(-34px, 28px) rotate(-7deg); opacity: 1; }
      68% { transform: translate(-104px, 88px) rotate(-16deg); opacity: 1; }
      84%, 100% { transform: translate(-152px, 126px) rotate(-28deg); opacity: 0; }
    }
    @keyframes docFeed {
      0% { transform: translate(0, 40px); opacity: 0; }
      3% { opacity: 1; }
      10% { transform: translate(0, 6px); opacity: 1; }
      13% { transform: translate(0, -18px); opacity: 0; }
      14%, 100% { transform: translate(0, -18px); opacity: 0; }
    }
    @keyframes blink {
      0%, 90%, 100% { transform: scaleY(1); }
      92%, 94% { transform: scaleY(.18); }
    }
    @keyframes waveLeft {
      0%, 100% { transform: rotate(0deg); }
      50% { transform: rotate(-9deg); }
    }
    @keyframes waveRight {
      0%, 100% { transform: rotate(0deg); }
      50% { transform: rotate(9deg); }
    }
    @keyframes scan {
      from { transform: translateY(-44px); opacity: .15; }
      45% { opacity: .5; }
      to { transform: translateY(48px); opacity: .05; }
    }
    @keyframes slotPulse {
      0%, 100% { fill: #3a1f10; }
      50% { fill: #76421f; }
    }
  </style>

  <rect width="640" height="360" rx="0" fill="#fff2dc" class="px"/>
  <rect x="34" y="34" width="572" height="292" fill="#fffaf0" stroke="#d9974a" stroke-width="8" class="px"/>
  <rect x="34" y="34" width="572" height="42" fill="#ffd7a0" stroke="#d9974a" stroke-width="8" class="px"/>
  <rect x="58" y="50" width="18" height="10" fill="#ef5d5d" class="px"/>
